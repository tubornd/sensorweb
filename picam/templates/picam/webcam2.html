{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django 기반 객체 인식</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .container {
            max-width: 1200px;
        }
        .camera-container {
            position: relative;
            margin-bottom: 20px;
        }
        #video, #canvas, #resultImage {
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        canvas {
            display: none;
        }
        #resultImage {
            display: none;
            margin-top: 20px;
        }
        .controls {
            margin: 20px 0;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0069d9;
        }
        .objects-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .object-item {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            background-color: #f0f0f0;
        }
        .confidence-bar {
            height: 5px;
            background-color: #28a745;
            border-radius: 2px;
            margin-top: 5px;
        }
        .detect-button {
            margin-right: 10px;
        }
        .status-info {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
        }
        .waiting {
            display: none;
            margin-top: 20px;
        }
        .spinner-border {
            width: 2rem;
            height: 2rem;
        }
        .django-badge {
            background-color: #092e20;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">
            웹캠 기반 실시간 객체 인식
            <span class="django-badge">Django</span>
        </h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="camera-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <img id="resultImage" alt="감지 결과">
                </div>
                
                <div class="controls">
                    <button id="captureBtn" class="btn btn-primary detect-button">1회 감지</button>
                    <button id="continuousBtn" class="btn btn-success">실시간 감지 시작</button>
                    <button id="stopBtn" class="btn btn-danger" style="display:none;">실시간 감지 중지</button>
                </div>
                
                <div id="waiting" class="waiting">
                    <div class="d-flex align-items-center">
                        <div class="spinner-border text-primary" role="status"></div>
                        <span class="ms-2">처리 중...</span>
                    </div>
                </div>
                
                <div class="status-info">
                    <div id="statusInfo">상태: 준비 중...</div>
                </div>
            </div>
            
            <div class="col-md-6">
                <h3>감지된 객체</h3>
                <div id="objectsList" class="objects-list"></div>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const captureBtn = document.getElementById('captureBtn');
            const continuousBtn = document.getElementById('continuousBtn');
            const stopBtn = document.getElementById('stopBtn');
            const resultImage = document.getElementById('resultImage');
            const objectsList = document.getElementById('objectsList');
            const waiting = document.getElementById('waiting');
            const statusInfo = document.getElementById('statusInfo');
            
            let stream = null;
            let isContinuous = false;
            let processingImage = false;
            
            // CSRF 토큰 가져오기
            function getCSRFToken() {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    const [name, value] = cookie.trim().split('=');
                    if (name === 'csrftoken') {
                        return value;
                    }
                }
                return null;
            }
            
            // 서버 상태 확인
            fetch('/status/')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'running') {
                        let statusText = 'GPU: ';
                        if (data.gpu_available) {
                            statusText += `사용 가능 (${data.gpu_name})`;
                        } else {
                            statusText += '사용 불가 (CPU 모드로 실행 중)';
                        }
                        statusText += ` | 프레임워크: ${data.framework}`;
                        statusInfo.textContent = statusText;
                    }
                })
                .catch(error => {
                    statusInfo.textContent = '서버 연결 오류: ' + error;
                });
            
            // 카메라 시작
            async function startCamera() {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            facingMode: 'environment' 
                        } 
                    });
                    video.srcObject = stream;
                } catch (err) {
                    console.error('카메라 접근 오류:', err);
                    alert('카메라에 접근할 수 없습니다. 카메라 권한을 확인해주세요.');
                }
            }
            
            // 이미지 캡처
            function captureImage() {
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                return canvas.toDataURL('image/jpeg');
            }
            
            // 객체 감지 요청
            async function detectObjects(imageData) {
                processingImage = true;
                waiting.style.display = 'block';
                
                const formData = new FormData();
                formData.append('image', imageData);
                
                // CSRF 토큰 가져오기
                const csrftoken = getCSRFToken();
                
                try {
                    const response = await fetch('/detect/', {
                        method: 'POST',
                        body: formData,
                        headers: {
                            'X-CSRFToken': csrftoken
                        }
                    });
                    
                    const result = await response.json();
                    processingImage = false;
                    waiting.style.display = 'none';
                    
                    if (result.success) {
                        displayResults(result);
                    } else {
                        console.error('감지 오류:', result.error);
                        alert('객체 감지 중 오류가 발생했습니다: ' + result.error);
                    }
                } catch (error) {
                    processingImage = false;
                    waiting.style.display = 'none';
                    console.error('네트워크 오류:', error);
                    alert('서버 연결에 실패했습니다.');
                }
            }
            
            // 결과 표시
            function displayResults(result) {
                // 결과 이미지 표시
                resultImage.src = result.result_image;
                resultImage.style.display = 'block';
                
                // 객체 목록 표시
                objectsList.innerHTML = '';
                
                if (result.objects.length === 0) {
                    objectsList.innerHTML = '<div class="alert alert-info">감지된 객체가 없습니다.</div>';
                    return;
                }
                
                result.objects.forEach(obj => {
                    const confidence = Math.round(obj.confidence * 100);
                    const objectItem = document.createElement('div');
                    objectItem.className = 'object-item';
                    objectItem.innerHTML = `
                        <div class="d-flex justify-content-between">
                            <strong>${obj.ko_class} (${obj.class})</strong>
                            <span>${confidence}%</span>
                        </div>
                        <div class="confidence-bar" style="width: ${confidence}%"></div>
                    `;
                    objectsList.appendChild(objectItem);
                });
            }
            
            // 실시간 감지 루프
            async function continuousDetection() {
                if (!isContinuous) return;
                
                if (!processingImage) {
                    const imageData = captureImage();
                    await detectObjects(imageData);
                }
                
                if (isContinuous) {
                    setTimeout(continuousDetection, 100);
                }
            }
            
            // 이벤트 리스너
            captureBtn.addEventListener('click', function() {
                const imageData = captureImage();
                detectObjects(imageData);
            });
            
            continuousBtn.addEventListener('click', function() {
                isContinuous = true;
                continuousBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                continuousDetection();
            });
            
            stopBtn.addEventListener('click', function() {
                isContinuous = false;
                continuousBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
            });
            
            // 카메라 시작
            startCamera();
        });
    </script>
</body>
</html>
